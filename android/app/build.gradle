// // apply from: "$rootProject.projectDir/../flutter/packages/flutter_tools/gradle/flutter.gradle"
// apply from: "$flutterSdkPath/packages/flutter_tools/gradle/flutter.gradle"
plugins {
    id "com.android.application"
    id "kotlin-android"
    id "com.google.gms.google-services" // ✅ Fixed Plugin ID
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterSdkPath = localProperties.getProperty('flutter.sdk') // ✅ Fix Flutter SDK Path
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

android {
    namespace "afro_caribbean.com"
    compileSdkVersion 34 // ✅ Use a fixed SDK version if needed
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17 // 🔧 Use Java 17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17' // 🔧 Use JVM target 17
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "afro_caribbean.com"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:32.3.1')
    implementation 'com.google.firebase:firebase-analytics-ktx'
}

// ✅ Apply Flutter Gradle plugin at the bottom (with correct path)
apply from: "$flutterSdkPath/packages/flutter_tools/gradle/flutter.gradle"
